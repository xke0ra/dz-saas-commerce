services:
  postgres:
    image: postgres:17-alpine
    container_name: dz_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dz_saas_commerce
      POSTGRES_USER: dz_user
      POSTGRES_PASSWORD: dz_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: dz_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: dz_meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: dz_meili_master_key
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

  minio:
    image: minio/minio:latest
    container_name: dz_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: dz_minio
      MINIO_ROOT_PASSWORD: dz_minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: dz_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  meili_data:
  minio_data:
