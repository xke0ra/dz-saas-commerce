services:
  backend-public-init:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE to an immutable backend image tag or digest}
    restart: "no"
    user: "0:0"
    command: >
      sh -lc "find /shared-public -mindepth 1 -maxdepth 1 -exec rm -rf {} + &&
      cp -a /var/www/html/public/. /shared-public/"
    volumes:
      - backend_public:/shared-public

  backend:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE to an immutable backend image tag or digest}
    restart: unless-stopped
    env_file:
      - ${BACKEND_ENV_FILE:-./backend.env.example}
    expose:
      - "9000"

  backend-queue:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE to an immutable backend image tag or digest}
    restart: unless-stopped
    env_file:
      - ${BACKEND_ENV_FILE:-./backend.env.example}
    command: php artisan queue:work redis --tries=3 --timeout=90 --sleep=3 --max-time=3600
    depends_on:
      backend:
        condition: service_started

  backend-scheduler:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE to an immutable backend image tag or digest}
    restart: unless-stopped
    env_file:
      - ${BACKEND_ENV_FILE:-./backend.env.example}
    command: php artisan schedule:work
    depends_on:
      backend:
        condition: service_started

  storefront:
    image: ${STOREFRONT_IMAGE:?Set STOREFRONT_IMAGE to an immutable storefront image tag or digest}
    restart: unless-stopped
    env_file:
      - ${STOREFRONT_ENV_FILE:-./storefront.env.example}
    expose:
      - "3000"

  edge:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${EDGE_PORT:-8080}:8080"
    volumes:
      - ../reverse-proxy/nginx-edge.conf.example:/etc/nginx/nginx.conf:ro
      - backend_public:/var/www/html/public:ro
    depends_on:
      backend-public-init:
        condition: service_completed_successfully
      backend:
        condition: service_started
      storefront:
        condition: service_started

volumes:
  backend_public:
