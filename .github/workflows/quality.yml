name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  repository-hygiene:
    name: Repository Hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Secret Hygiene
        run: bash scripts/security/secret-hygiene.sh

      - name: Clean Export
        run: bash scripts/release/clean-export-check.sh

  backend:
    name: Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: dz_saas_commerce_testing
          POSTGRES_USER: dz_user
          POSTGRES_PASSWORD: dz_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U dz_user -d dz_saas_commerce_testing"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: bcmath, intl, pdo_pgsql, redis, zip
          coverage: none

      - name: Validate Composer
        run: composer validate --strict

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Audit Composer Dependencies
        run: composer audit --no-interaction

      - name: Format Check
        run: php vendor/bin/pint --test

      - name: Prepare Environment
        run: |
          cp .env.testing.example .env
          php artisan key:generate --ansi

      - name: Migration Smoke
        run: php artisan migrate:fresh --seed --force

      - name: Readiness Smoke
        run: php artisan system:health --scope=ready --format=json

      - name: Test
        run: php artisan test

      - name: Route Smoke
        run: php artisan route:list

  storefront:
    name: Storefront
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: storefront

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.2 --activate

      - name: Resolve pnpm Store
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Cache pnpm Store
        uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('storefront/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit Dependencies
        run: pnpm audit --audit-level moderate

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  docker-check:
    name: Dockerfile Checks
    runs-on: ubuntu-latest
    env:
      TRIVY_IMAGE: aquasec/trivy:0.70.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Backend Dockerfile
        run: docker buildx build --check -f backend/Dockerfile backend

      - name: Build Backend Image
        run: docker buildx build --load -f backend/Dockerfile -t dz-saas-commerce-backend:ci backend

      - name: Scan Backend Image
        run: scripts/security/container-image-scan.sh dz-saas-commerce-backend:ci

      - name: Check Storefront Dockerfile
        run: docker buildx build --check -f storefront/Dockerfile storefront

      - name: Build Storefront Image
        run: docker buildx build --load -f storefront/Dockerfile -t dz-saas-commerce-storefront:ci storefront

      - name: Scan Storefront Image
        run: scripts/security/container-image-scan.sh dz-saas-commerce-storefront:ci

  e2e:
    name: Storefront E2E
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: storefront

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.2 --activate

      - name: Resolve pnpm Store
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Cache pnpm Store
        uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('storefront/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('storefront/pnpm-lock.yaml') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright
        run: pnpm test:e2e

      - name: Upload Playwright Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            storefront/test-results
            storefront/playwright-report
